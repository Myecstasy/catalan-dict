name: Publish Digital Garden
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Digital Garden
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build
        run: |
          npm install -g @digital-garden/cli
          npx @digital-garden/cli build
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
